name: CI

on:
  push:
    branches:
      - main
      - work
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-and-python:
    name: Backend C++ and Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++ make libpq-dev

      - name: Run C++ backend tests
        run: make test-cpp

      - name: Run Python unit tests
        run: python -m unittest discover -s tests/python

      - name: Dry-run PostgreSQL import
        run: python scripts/import_courses_to_postgres.py --dry-run

      - name: Run CSV-backed API smoke test
        run: make test-api-smoke

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
